name: CI-CD-Front-Azure

on:
  push:
    branches:
      - main

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # TEST
      - name: Install & Test
        run: |
          cd front-azure
          npm install
          npm test

      # DÉPLOIEMENT
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_ROCK_0B0F16303 }}
          action: "upload"
          app_location: "./front-azure" 
          output_location: "dist"
          api_location: ""